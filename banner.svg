  <rect x="870" y="160" width="162" height="58" rx="14"
        fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="951" y="186" text-anchor="middle"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
