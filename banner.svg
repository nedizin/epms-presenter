        fill="#7F52FF" fill-opacity="0.18" stroke="#7F52FF" stroke-opacity="0.45" stroke-width="1"/>
  <text x="524" y="312" text-anchor="middle"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
        font-size="12" font-weight="600" fill="#C5B3FF">Kotlin</text>

  <rect x="572" y="295" width="142" height="26" rx="13"
        fill="#00897B" fill-opacity="0.15" stroke="#00897B" stroke-opacity="0.4" stroke-width="1"/>
  <text x="643" y="312" text-anchor="middle"
