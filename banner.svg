      <rect x="30" y="277" width="16" height="2.5" rx="1.25" fill="white"/>
      <rect x="30" y="283" width="16" height="2.5" rx="1.25" fill="white"/>
      <rect x="30" y="289" width="11" height="2.5" rx="1.25" fill="white"/>
