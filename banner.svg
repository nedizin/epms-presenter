      <circle cx="88" cy="87" r="13" fill="white" fill-opacity="0.13"/>
      <rect x="30" y="106" width="116" height="8" rx="4" fill="white" fill-opacity="0.58"/>
      <rect x="42" y="118" width="92"  height="6" rx="3" fill="white" fill-opacity="0.38"/>
      <rect x="50" y="128" width="76"  height="6" rx="3" fill="white" fill-opacity="0.38"/>
