<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#060E22"/>
      <stop offset="45%"  stop-color="#0C1B42"/>
      <stop offset="100%" stop-color="#060E22"/>
    </linearGradient>
    <linearGradient id="hdrGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="beautyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#9A0044"/>
    </linearGradient>
    <linearGradient id="healthGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#43A047"/>
      <stop offset="100%" stop-color="#2A6B2E"/>
    </linearGradient>
    <linearGradient id="hosGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#A85D00"/>
    </linearGradient>
    <linearGradient id="commGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8E24AA"/>
      <stop offset="100%" stop-color="#5A1070"/>
    </linearGradient>
    <linearGradient id="sportsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#115899"/>
    </linearGradient>
    <linearGradient id="techGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#222F78"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bgGrad)"/>

  <!-- Ambient glow circles -->
  <circle cx="1175" cy="-55" r="310" fill="#1976D2" fill-opacity="0.07"/>
  <circle cx="25"   cy="490" r="295" fill="#0D47A1" fill-opacity="0.06"/>
  <circle cx="452"  cy="208" r="230" fill="#1565C0" fill-opacity="0.05"/>

