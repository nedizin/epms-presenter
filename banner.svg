  <!-- ════════════════════════ -->
  <!-- CATEGORY COLOUR STRIP   -->
  <!-- ════════════════════════ -->
  <rect x="0"    y="385" width="200" height="35" fill="#E91E63"/>
  <rect x="200"  y="385" width="200" height="35" fill="#43A047"/>
  <rect x="400"  y="385" width="200" height="35" fill="#FF8F00"/>
  <rect x="600"  y="385" width="200" height="35" fill="#8E24AA"/>
  <rect x="800"  y="385" width="200" height="35" fill="#1E88E5"/>
  <rect x="1000" y="385" width="200" height="35" fill="#3949AB"/>

  <text x="100"  y="407" text-anchor="middle"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
        font-size="11" font-weight="600" fill="white" fill-opacity="0.92">Beleza</text>
  <text x="300"  y="407" text-anchor="middle"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
