      <rect x="93" y="60" width="75" height="82" rx="10" fill="url(#healthGrad)"/>
      <!-- Card icons -->
      <circle cx="46"  cy="83" r="13" fill="white" fill-opacity="0.22"/>
      <circle cx="131" cy="83" r="13" fill="white" fill-opacity="0.22"/>
      <!-- Card text -->
      <rect x="15"  y="101" width="55" height="6" rx="3" fill="white" fill-opacity="0.65"/>
      <rect x="15"  y="111" width="42" height="4" rx="2" fill="white" fill-opacity="0.35"/>
      <rect x="100" y="101" width="55" height="6" rx="3" fill="white" fill-opacity="0.65"/>
      <rect x="100" y="111" width="42" height="4" rx="2" fill="white" fill-opacity="0.35"/>
      <!-- Course cards row 2 -->
