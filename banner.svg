      <rect x="8"  y="240" width="75" height="38" rx="10" fill="url(#sportsGrad)" fill-opacity="0.65"/>
      <rect x="93" y="240" width="75" height="38" rx="10" fill="url(#techGrad)"   fill-opacity="0.65"/>
