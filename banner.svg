      <circle cx="28" cy="178" r="9" fill="#1976D2" fill-opacity="0.7"/>
      <rect x="44" y="174" width="90" height="6" rx="3" fill="white" fill-opacity="0.82"/>
      <rect x="44" y="183" width="68" height="5" rx="2" fill="white" fill-opacity="0.44"/>
      <!-- Answer B -->
      <rect x="10" y="201" width="156" height="32" rx="10" fill="white" fill-opacity="0.07"/>
      <circle cx="28" cy="217" r="9" fill="#43A047" fill-opacity="0.5"/>
      <rect x="44" y="213" width="98" height="6" rx="3" fill="white" fill-opacity="0.6"/>
      <rect x="44" y="222" width="74" height="5" rx="2" fill="white" fill-opacity="0.3"/>
      <!-- Answer C -->
      <rect x="10" y="240" width="156" height="32" rx="10" fill="white" fill-opacity="0.07"/>
      <circle cx="28" cy="256" r="9" fill="#FF8F00" fill-opacity="0.5"/>
      <rect x="44" y="252" width="84" height="6" rx="3" fill="white" fill-opacity="0.6"/>
      <rect x="44" y="261" width="62" height="5" rx="2" fill="white" fill-opacity="0.3"/>
